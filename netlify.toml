# ============================================================
# netlify.toml
# Netlify deployment configuration for New World Standard
# ============================================================

[build]
  publish = "."
  command = ""
  functions = "netlify/functions"

# ── HEADERS ──────────────────────────────────────────────────
# Security + performance headers applied to all pages
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# Cache HTML pages for 1 minute (always fresh content)
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=60, stale-while-revalidate=300"

# Cache CSS/JS for 1 year (fingerprinted filenames)
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache images for 1 week
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"

# ── REDIRECTS ────────────────────────────────────────────────
# Clean URLs — /article → /article.html
[[redirects]]
  from = "/article"
  to   = "/article.html"
  status = 200

[[redirects]]
  from = "/about"
  to   = "/about.html"
  status = 200

# 404 fallback
[[redirects]]
  from = "/*"
  to   = "/404.html"
  status = 404

# ── FUNCTIONS ────────────────────────────────────────────────
[functions]
  node_bundler = "esbuild"
