# Use DecapBridge PKCE auth (required)
backend:
  name: git-gateway
  repo: oleg-danisin/newworldstandard
  branch: main
  auth_type: pkce
  base_url: https://auth.decapbridge.com
  auth_endpoint: /sites/382e2395-f2d3-4b6c-a1b0-75a7507c4f98/pkce
  auth_token_endpoint: /sites/382e2395-f2d3-4b6c-a1b0-75a7507c4f98/token
  gateway_url: https://gateway.decapbridge.com

  # See who did what (optional)
  commit_messages:
    create: Create {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
    update: Update {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
    delete: Delete {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
    uploadMedia: Upload “{{path}}” - {{author-name}} <{{author-login}}> via DecapBridge
    deleteMedia: Delete “{{path}}” - {{author-name}} <{{author-login}}> via DecapBridge
    openAuthoring: Message {{message}} - {{author-name}} <{{author-login}}> via DecapBridge

# Enable PKCE fields (optional, recommended)
auth:
  email_claim: email
  first_name_claim: first_name
  last_name_claim: last_name
  avatar_url_claim: avatar_url

# Better Decap + Bridge logo (optional)
logo_url: https://decapbridge.com/decapcms-with-bridge.svg

# Add site links in Decap CMS (optional)
site_url: https://newworldstandard.com

display_url: https://newworldstandard.com
# Where uploaded images get saved
media_folder: "images/articles"
public_folder: "/images/articles"

collections:
  - name: "articles"
    label: "Articles"
    # Saves files directly in /articles/ as article-slug.md
    folder: "articles"
    create: true
    # File named after the title slug
    slug: "{{slug}}"
    # Frontmatter format
    format: "frontmatter"
    fields:
      - label: "Title"
        name: "title"
        widget: "string"
        hint: "The article headline. Keep it under 60 characters for SEO."

      - label: "Deck"
        name: "deck"
        widget: "text"
        hint: "One or two sentences summarising the article. This appears under the headline and in Google search results."

      - label: "Author"
        name: "author"
        widget: "select"
        options:
          - "Dominic Prescott Welty"
          - "Jacob Aldaco"
        default: "Dominic Prescott Welty"

      - label: "Publish Date"
        name: "date"
        widget: "datetime"
        default: ""
        date_format: "YYYY-MM-DD"
        time_format: "HH:mm"

      - label: "Category"
        name: "category"
        widget: "select"
        options:
          - "Ideas"
          - "Opinion"
          - "World"
          - "Politics"
          - "Society"
          - "Science & Health"
          - "Technology"
          - "Long Reads"
        default: "Ideas"

      - label: "Cover Image"
        name: "cover"
        widget: "image"
        required: false
        hint: "Main article image. Recommended size: 1200x630px. Compress before uploading."

      - label: "Tags"
        name: "tags"
        widget: "list"
        required: false
        hint: "Comma-separated tags e.g. AI, Pentagon, National Security"

      - label: "Body"
        name: "body"
        widget: "markdown"
        hint: "Write your article here. Use ## for section headings, > for pull quotes."
